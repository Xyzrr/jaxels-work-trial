# Fully resolved Linux pod lock for scripts/setup_torchtitan_pod_venv.py.
#
# The setup script feeds this file to `uv pip sync` inside the GPU pod. That
# makes the training runtime reproducible at the Python-package level: PyTorch,
# TorchAO, CUDA wheels, Hugging Face asset tooling, and their transitive
# dependencies are replaced with exactly the versions listed here before a
# TorchTitan run starts.
#
# This lock was generated from the verified
# /workspace/venvs/torchtitan-swehero-cu128 venv after CUDA and TorchTitan
# import checks passed. Do not hand-refresh individual pins unless you are
# intentionally changing the ML runtime and will rerun the pod verification
# steps in scripts/setup_torchtitan_pod_venv.py.
#
# PyTorch nightly CUDA wheels live on the CUDA-specific index, while companion
# packages such as torchdata can be CPU-only. Keeping both indexes here lets
# `uv pip sync` resolve the same wheel family when the lock is recreated.
--extra-index-url https://download.pytorch.org/whl/nightly/cu128
--extra-index-url https://download.pytorch.org/whl/nightly/cpu

