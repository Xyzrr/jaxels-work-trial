apiVersion: v1
kind: Namespace
metadata:
  name: midtraining
---
apiVersion: v1
kind: Pod
metadata:
  name: openhands-eval-driver
  namespace: midtraining
  labels:
    app: openhands-eval-driver
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: gpu-dp-8sd75-hxggv
  containers:
    - name: eval
      image: ubuntu:22.04
      imagePullPolicy: IfNotPresent
      command:
        - bash
        - -lc
        - |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            coreutils \
            curl \
            docker-buildx \
            docker.io \
            git \
            jq \
            openssh-client \
            python3 \
            python3-pip \
            python3-venv \
            tmux
          rm -rf /var/lib/apt/lists/*
          mkdir -p /workspace/runlogs
          tmux new-session -d -s eval-dockerd \
            "dockerd --host=unix:///var/run/docker.sock > /workspace/runlogs/eval-dockerd.log 2>&1"
          sleep infinity
      securityContext:
        privileged: true
      volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: docker-graph
          mountPath: /var/lib/docker
  volumes:
    - name: workspace
      hostPath:
        path: /workspace
        type: Directory
    - name: docker-graph
      hostPath:
        path: /workspace/pod-docker-data/openhands-eval-driver
        type: DirectoryOrCreate
