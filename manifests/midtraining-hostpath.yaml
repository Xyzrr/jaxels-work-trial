apiVersion: v1
kind: Namespace
metadata:
  name: midtraining
---
apiVersion: v1
kind: Pod
metadata:
  name: midtraining-dev
  namespace: midtraining
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: gpu-dp-8sd75-hxggv
  containers:
    - name: trainer
      image: nvidia/cuda:12.8.0-base-ubuntu22.04
      imagePullPolicy: IfNotPresent
      command:
        - bash
        - -lc
        - |
          missing_packages=()
          command -v tmux >/dev/null 2>&1 || missing_packages+=(tmux)
          command -v git >/dev/null 2>&1 || missing_packages+=(git)
          command -v ssh >/dev/null 2>&1 || missing_packages+=(openssh-client)
          command -v cc >/dev/null 2>&1 || missing_packages+=(build-essential)
          command -v lspci >/dev/null 2>&1 || missing_packages+=(pciutils)
          command -v curl >/dev/null 2>&1 || missing_packages+=(curl)
          command -v docker >/dev/null 2>&1 || missing_packages+=(docker.io)
          command -v jq >/dev/null 2>&1 || missing_packages+=(jq)
          command -v python3 >/dev/null 2>&1 || missing_packages+=(python3 python3-venv python3-pip)
          docker buildx version >/dev/null 2>&1 || missing_packages+=(docker-buildx)
          if ((${#missing_packages[@]})); then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends "${missing_packages[@]}"
            rm -rf /var/lib/apt/lists/*
          fi
          if [[ -f /var/run/midtraining-git-ssh/id_ed25519 ]]; then
            if [[ -f /var/run/midtraining-git-ssh/known_hosts ]]; then
              install -d -m 700 /root/.ssh
              install -m 600 /var/run/midtraining-git-ssh/id_ed25519 /root/.ssh/id_ed25519
              if [[ -f /var/run/midtraining-git-ssh/id_ed25519.pub ]]; then
                install -m 644 /var/run/midtraining-git-ssh/id_ed25519.pub /root/.ssh/id_ed25519.pub
              fi
              install -m 644 /var/run/midtraining-git-ssh/known_hosts /root/.ssh/known_hosts
              cat >/root/.ssh/config <<'SSH_CONFIG'
          Host github.com
            HostName github.com
            User git
            IdentityFile /root/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile /root/.ssh/known_hosts
          SSH_CONFIG
              chmod 600 /root/.ssh/config
              if [[ -f /var/run/midtraining-git-ssh/gitconfig ]]; then
                git config --global include.path /var/run/midtraining-git-ssh/gitconfig
              fi
              git config --global --add safe.directory /workspace/jaxels-work-trial
            else
              echo "midtraining-git-ssh secret is missing known_hosts; skipping Git SSH setup" >&2
            fi
          fi
          export UV_CACHE_DIR=/workspace/.cache/uv
          export UV_PYTHON_INSTALL_DIR=/workspace/python
          /workspace/uv/uv-0.11.16/uv python install 3.10.12 \
            --install-dir /workspace/python \
            --no-bin
          sleep infinity
      securityContext:
        privileged: true
      resources:
        limits:
          nvidia.com/gpu: 8
      env:
        - name: HF_HOME
          value: /workspace/.cache/huggingface
        - name: TORCH_HOME
          value: /workspace/.cache/torch
      volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: docker-graph
          mountPath: /var/lib/docker
        - name: git-ssh
          mountPath: /var/run/midtraining-git-ssh
          readOnly: true
  volumes:
    - name: workspace
      hostPath:
        path: /workspace
        type: Directory
    - name: docker-graph
      hostPath:
        path: /workspace/pod-docker-data/midtraining-dev
        type: DirectoryOrCreate
    - name: git-ssh
      secret:
        secretName: midtraining-git-ssh
        optional: true
        defaultMode: 0400
